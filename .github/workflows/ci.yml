name: CI

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"

jobs:
  # ── Swift package: build + test ──────────────────────────────────────────
  swift-core:
    name: Swift — build & test TidyQuestCore
    # macos-15 ships Xcode 16.x / Swift 6; macos-14 only has Swift 5.10
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/TidyQuestCore
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        # Xcode 16.x is at this path on macos-15 runners.
        # Falls back gracefully if not found (xcode-select exits 0 when already correct).
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "${XCODE_PATH}/Contents/Developer"
          fi
          swift --version

      - name: Swift build
        run: swift build -c release

      - name: Swift test
        run: swift test

  # ── Supabase: migration lint ─────────────────────────────────────────────
  migration-lint:
    name: Supabase — migration lint
    runs-on: ubuntu-latest
    # Expose token as job-level env so step if: conditions can check it.
    # secrets context is not available in job-level if:, but env context is
    # available in step-level if: once set here.
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: supabase db lint
        # Skip gracefully when SUPABASE_ACCESS_TOKEN secret is not configured.
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' }}
        run: supabase db lint --project-id "${{ secrets.SUPABASE_PROJECT_ID_STAGING }}"

  # ── Deno edge-function tests ─────────────────────────────────────────────
  deno-functions:
    name: Deno — edge function schema tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno test (unit/schema only — no running Supabase stack required)
        # Exclude the 7 integration test files that make HTTP calls to localhost:54321.
        # Those tests require a full local Supabase stack (Docker) and are skipped in CI.
        # All other tests (schema validation, contract shape, payload builders) run here.
        # See docs/CI.md for how to run the full integration suite locally.
        run: |
          deno test --allow-env \
            --ignore=family-create \
            --ignore=family-delete \
            --ignore=family-update \
            --ignore=user-add-kid \
            --ignore=user-claim-pair \
            --ignore=user-pair-device \
            --ignore=user-revoke-device \
            .
        working-directory: supabase/functions

  # ── Supabase: RLS policy tests ───────────────────────────────────────────
  rls-tests:
    name: Supabase — RLS policy tests
    # ubuntu-latest ships Docker by default; macos-15 runners do not, so the
    # Supabase CLI (which uses docker-compose) requires Linux here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        # `supabase start` pulls Docker images on first run, applies migrations,
        # and loads supabase/seed.sql. Migration 20260422000004_rls_policies.sql
        # references auth.jwt(), which is created by the auth (gotrue) service —
        # so the full stack must come up, not just the db container.
        run: supabase start

      - name: Verify stack health
        run: supabase status

      # NOTE: `supabase start` on a fresh CI runner already applies every
      # migration and runs supabase/seed.sql — `supabase db reset` would be
      # redundant here and has been observed to 502 during its internal
      # container-restart phase on GitHub-hosted runners (flake), so we skip it.

      - name: Ensure psql is installed
        # run_all.sh shells out to psql against 127.0.0.1:54322. Ubuntu
        # runners usually include postgresql-client; pin the install for
        # determinism.
        run: |
          if ! command -v psql >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: Run RLS test suite
        run: bash supabase/tests/rls/run_all.sh --ci

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== docker ps ==="
          docker ps || true
          echo ""
          echo "=== supabase_db_tidy-quest logs (last 100) ==="
          docker logs --tail 100 supabase_db_tidy-quest || true
          echo ""
          echo "=== supabase_auth_tidy-quest logs (last 50) ==="
          docker logs --tail 50 supabase_auth_tidy-quest || true

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop --no-backup || true
