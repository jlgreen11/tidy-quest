name: CI

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"

jobs:
  # ── Swift package: build + test ──────────────────────────────────────────
  swift-core:
    name: Swift — build & test TidyQuestCore
    runs-on: macos-14          # Xcode 15, Swift 6
    defaults:
      run:
        working-directory: ios/TidyQuestCore
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Swift build
        run: swift build -c release

      - name: Swift test
        run: swift test

  # ── Supabase: migration lint ─────────────────────────────────────────────
  migration-lint:
    name: Supabase — migration lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: supabase db lint
        run: supabase db lint --project-id "${{ secrets.SUPABASE_PROJECT_ID_STAGING }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── RLS test suite ───────────────────────────────────────────────────────
  rls-tests:
    name: Supabase — RLS test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Run RLS tests
        run: bash supabase/tests/rls/run_all.sh

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

  # ── Deno edge-function tests ─────────────────────────────────────────────
  deno-functions:
    name: Deno — edge function tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno test
        run: deno test --allow-env --allow-net
        working-directory: supabase/functions
