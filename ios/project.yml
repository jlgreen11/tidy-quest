name: TidyQuest
options:
  bundleIdPrefix: com.jlgreen11.tidyquest
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  groupSortPosition: top
  useBaseInternationalization: true

# ─── Build configurations ───────────────────────────────────────────────────

configs:
  Debug-Staging:   debug
  Debug-Prod:      debug
  Release-Staging: release
  Release-Prod:    release

# ─── Shared settings ────────────────────────────────────────────────────────

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# ─── Packages ───────────────────────────────────────────────────────────────

packages:
  TidyQuestCore:
    path: TidyQuestCore

# ─── Targets ────────────────────────────────────────────────────────────────

targets:

  # ── ParentApp ──────────────────────────────────────────────────────────────
  ParentApp:
    type: application
    platform: iOS
    sources:
      - ParentApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jlgreen11.tidyquest.parent
        INFOPLIST_FILE: ParentApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Debug-Staging:
          XCCONFIG_FILE: Config/ParentApp-Staging.xcconfig
        Debug-Prod:
          XCCONFIG_FILE: Config/ParentApp-Prod.xcconfig
        Release-Staging:
          XCCONFIG_FILE: Config/ParentApp-Staging.xcconfig
        Release-Prod:
          XCCONFIG_FILE: Config/ParentApp-Prod.xcconfig
    dependencies:
      - package: TidyQuestCore
    scheme:
      configs:
        Debug:   Debug-Staging
        Release: Release-Prod
      environmentVariables: {}
      gatherCoverageData: true

  # ── KidApp ─────────────────────────────────────────────────────────────────
  KidApp:
    type: application
    platform: iOS
    sources:
      - KidApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jlgreen11.tidyquest.kid
        INFOPLIST_FILE: KidApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Debug-Staging:
          XCCONFIG_FILE: Config/KidApp-Staging.xcconfig
        Debug-Prod:
          XCCONFIG_FILE: Config/KidApp-Prod.xcconfig
        Release-Staging:
          XCCONFIG_FILE: Config/KidApp-Staging.xcconfig
        Release-Prod:
          XCCONFIG_FILE: Config/KidApp-Prod.xcconfig
    dependencies:
      - package: TidyQuestCore
    scheme:
      configs:
        Debug:   Debug-Staging
        Release: Release-Prod
      environmentVariables: {}
      gatherCoverageData: true

  # ── WidgetBundle ───────────────────────────────────────────────────────────
  WidgetBundle:
    type: app-extension
    platform: iOS
    sources:
      - WidgetBundle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jlgreen11.tidyquest.widgets
        INFOPLIST_FILE: WidgetBundle/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: TidyQuestCore

# ─── Schemes (named per architecture convention) ────────────────────────────

schemes:
  ParentApp-Staging:
    build:
      targets:
        ParentApp: all
    run:
      config: Debug-Staging
    test:
      config: Debug-Staging
      gatherCoverageData: true
    archive:
      config: Release-Staging

  ParentApp-Prod:
    build:
      targets:
        ParentApp: all
    run:
      config: Debug-Prod
    test:
      config: Debug-Prod
      gatherCoverageData: true
    archive:
      config: Release-Prod

  KidApp-Staging:
    build:
      targets:
        KidApp: all
    run:
      config: Debug-Staging
    test:
      config: Debug-Staging
      gatherCoverageData: true
    archive:
      config: Release-Staging

  KidApp-Prod:
    build:
      targets:
        KidApp: all
    run:
      config: Debug-Prod
    test:
      config: Debug-Prod
      gatherCoverageData: true
    archive:
      config: Release-Prod
